<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050A" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#9333EA" />
    </linearGradient>
    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Blobs -->
  <circle cx="200" cy="100" r="150" fill="#2563EB" opacity="0.3" filter="url(#blur-glow)" />
  <circle cx="1000" cy="300" r="200" fill="#9333EA" opacity="0.2" filter="url(#blur-glow)" />
  <circle cx="600" cy="200" r="120" fill="#00e5ff" opacity="0.15" filter="url(#blur-glow)" />

  <!-- Glass Panel -->
  <rect x="150" y="80" width="900" height="240" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  
  <!-- Content -->
  <g transform="translate(600, 180)" text-anchor="middle">
    <text y="-20" font-family="'Inter', system-ui, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-2">
      Linacre<tspan fill="url(#neon-glow)">.site</tspan>
    </text>
    <text y="40" font-family="'Fira Code', monospace" font-size="24" font-weight="400" fill="#a8abb8" letter-spacing="4">
      LLM HUB &amp; SUPER-APP
    </text>
    <text y="90" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="600" fill="#00e5ff" opacity="0.8">
      CROSS-PLATFORM • VRAM CALCULATOR • ARENA.AI BENCHMARKS
    </text>
  </g>

  <!-- Abstract UI Elements -->
  <path d="M 200 130 L 250 130 A 10 10 0 0 1 260 140 L 260 170" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" />
  <circle cx="200" cy="130" r="4" fill="#00e5ff" />
  
  <path d="M 1000 270 L 950 270 A 10 10 0 0 1 940 260 L 940 230" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" />
  <circle cx="1000" cy="270" r="4" fill="#9333EA" />
</svg>
